<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        *{
            margin: 0;
            font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, 'Open Sans', 'Helvetica Neue', sans-serif;
        }
        .table-container{
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            border: 2px solid black;
            padding: 10px;
            background-color: rgb(152, 213, 246);
            gap: 10px;
            margin: 20px 40px;
            width : auto;
        }

        .table-heading{
            background-color: rgb(24, 195, 218);
            font-weight: 700;
            padding: 20px;
            text-align: center;
            border-radius: 15px;
            font-size: 20px;
        }

        .table-cell{
            background-color: rgb(247, 139, 231);
            padding: 20px;
            font-size: 18px;
            text-align: center;
            border-radius: 15px;
            text-align: center;
            justify-content: center;
            font-weight: 500;
        }


        @media (max-width: 768px) {
            .table-container {
                grid-template-columns: repeat(7, 1fr);
                width: 100%;
            }

            .table-heading {
                font-size: 12px;
            }
            .table-cell {
                font-size: 8px;
            }

        }

        @media (max-width: 1200px) {
            .table-container {
                grid-template-columns: repeat(7, 1fr);
                width:auto;
            }

            .table-heading {
                font-size: 16px;
            }
            .table-cell {
                font-size: 12px;
            }
        }
    </style>
</head>
<body>
    <h1 style="font-size: 30px; text-align: center;"> Time Table </h1>

    <div class="table-container">
        <div class="table-heading"> Time </div>
        <div class="table-heading"> Monday </div>
        <div class="table-heading"> Tuesday </div>
        <div class="table-heading"> Wednesday </div>
        <div class="table-heading"> Thursday </div>
        <div class="table-heading"> Friday </div>
        <div class="table-heading"> Saturday </div>


        <div class="table-cell"> 8:30 - 10:10 </div>
        <div class="table-cell"> HTML</div>
        <div class="table-cell"> CSS </div>
        <div class="table-cell"> JavaScript </div>
        <div class="table-cell"> Python </div>
        <div class="table-cell"> Java </div>
        <div class="table-cell"> C++ </div>

        <div class="table-cell"> 10:10 - 11:40 </div>
        <div class="table-cell"> HTML</div>
        <div class="table-cell"> CSS </div>
        <div class="table-cell"> JavaScript </div>
        <div class="table-cell"> Python </div>
        <div class="table-cell"> Java </div>
        <div class="table-cell"> C++ </div>

        <div class="table-cell" style="grid-column: 1 / -1; text-align: center; background-color: rgb(179, 111, 243);"> Lunch Break </div>
        
        <div class="table-cell"> 12:20 - 3:30 </div>
        <div class="table-cell"> HTML</div>
        <div class="table-cell"> CSS </div>
        <div class="table-cell"> JavaScript </div>
        <div class="table-cell"> Python </div>
        <div class="table-cell"> Java </div>
        <div class="table-cell"> C++ </div>

    </div>
</body>
</html>
